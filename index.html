<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 World Cup Runner</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="gameContainer">

    <canvas id="game" width="1000" height="500"></canvas>

    <div id="ui">

        <div class="topBar">
            <div class="box">
                ⚽ Score:
                <span id="score">0</span>
            </div>

            <div class="box">
                🏃 Distance:
                <span id="distance">0</span> m
            </div>
        </div>

        <div id="startScreen">
            <h1>🏆 WORLD CUP RUNNER</h1>

            <p>
                Run through the stadium.
                Collect soccer balls.
                Dodge cones.
            </p>

            <p>
                ⬆ SPACE / W = Jump
            </p>

            <p>
                ⬇ S / DOWN = Slide
            </p>

            <button id="startBtn">
                Start Game
            </button>
        </div>

        <div id="gameOver">

            <h1>GAME OVER</h1>

            <h2>
                Final Score:
                <span id="finalScore">0</span>
            </h2>

            <button id="restartBtn">
                Play Again
            </button>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
